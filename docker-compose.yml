services:
  ollama:
    image: ollama/ollama:latest
    container_name: chopper-ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ollama:/root/.ollama

  chopper-ai:
    image: ghcr.io/zachwozn/chopper-service:latest   # <-- replace OWNER with your GitHub username (lowercase)
    container_name: chopper-ai
    restart: unless-stopped
    pull_policy: always
    environment:
      OLLAMA_URL: http://ollama:11434/api/chat
      CHOPPER_MODEL: ${CHOPPER_MODEL:-llama3.2:3b}
      NOTES_DIR: /data/notes
      PERSONA_FILE: /data/personas.json
      CHOPPER_API_SECRET: ${CHOPPER_API_SECRET}
    ports:
      - "8123:8000"              # the endpoint your bot calls
    depends_on:
      - ollama

volumes:
  ollama:
