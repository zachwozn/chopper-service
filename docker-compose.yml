services:
  ollama:
    image: ollama/ollama:latest
    container_name: chopper-ollama
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    # CPU-only: no `deploy.resources.reservations.devices` (GPU) block.

  chopper-ai:
    build: .
    container_name: chopper-ai
    restart: unless-stopped
    environment:
      OLLAMA_URL: http://ollama:11434/api/chat
      CHOPPER_MODEL: ${CHOPPER_MODEL:-llama3.2:3b}
      NOTES_DIR: /data/notes
      PERSONA_FILE: /data/personas.json
      CHOPPER_API_SECRET: ${CHOPPER_API_SECRET}
    volumes:
      - ./data:/data:ro          # your notes + personas.json, read-only
    ports:
      - "8000:8000"              # the endpoint your bot calls
    depends_on:
      - ollama

volumes:
  ollama:
